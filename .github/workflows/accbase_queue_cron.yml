name: Accbase queue samples

on:
  schedule:
    # run every day at 19:00 UTC (after bedbase workflows at 18:00)
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install peppy pephubclient psycopg2-binary pyyaml

      - name: Get date range
        run: |
          echo "current_date=$(date +'%Y/%m/%d')" >> $GITHUB_ENV
          echo "date_3_days_ago=$(date -d '3 days ago' +'%Y/%m/%d')" >> $GITHUB_ENV

      - name: Queue new samples
        run: python accbase/queue.py --start-date ${{ env.date_3_days_ago }} --end-date ${{ env.current_date }} --config accbase/config.yaml
        env:
          ACCBASE_POSTGRES_HOST: ${{ secrets.ACCBASE_POSTGRES_HOST }}
          ACCBASE_POSTGRES_PASSWORD: ${{ secrets.ACCBASE_POSTGRES_PASSWORD }}
          ACCBASE_POSTGRES_USER: ${{ secrets.ACCBASE_POSTGRES_USER }}
          PEPHUB_API_KEY: ${{ secrets.PEPHUB_API_KEY }}
